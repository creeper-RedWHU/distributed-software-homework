# =============================================
# 负载均衡部署方案
# 启动: docker-compose -f docker-compose.lb.yml up -d --build
# =============================================

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seckill_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seckill-network

  # ==================== 后端实例 1 (端口 8081) ====================
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-app1
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_SQL_INIT_MODE: always
      TZ: Asia/Shanghai
    volumes:
      - app1-logs:/app/logs
    networks:
      - seckill-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==================== 后端实例 2 (端口 8082) ====================
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-app2
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_SQL_INIT_MODE: always
      TZ: Asia/Shanghai
    volumes:
      - app2-logs:/app/logs
    networks:
      - seckill-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==================== Nginx 负载均衡 (端口 80) ====================
  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: always
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/lb.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/static:/usr/share/nginx/html/static:ro
      - nginx-logs:/var/log/nginx
    networks:
      - seckill-network

volumes:
  mysql-data:
  redis-data:
  app1-logs:
  app2-logs:
  nginx-logs:

networks:
  seckill-network:
    driver: bridge
