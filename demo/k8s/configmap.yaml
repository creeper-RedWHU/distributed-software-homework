apiVersion: v1
kind: ConfigMap
metadata:
  name: seckill-config
  namespace: seckill
data:
  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: seckill-system
      datasource:
        url: jdbc:mysql://mysql-service:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
        username: root
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 30
          minimum-idle: 10
          connection-timeout: 30000
          idle-timeout: 600000
      data:
        redis:
          host: redis-service
          port: 6379
          database: 0
          timeout: 3000ms
          lettuce:
            pool:
              max-active: 30
              max-idle: 10
              min-idle: 5
              max-wait: 3000ms
      kafka:
        bootstrap-servers: kafka-service:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
          acks: all
          retries: 3
        consumer:
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          auto-offset-reset: earliest
          enable-auto-commit: false
          properties:
            spring.json.trusted.packages: com.example.demo.model.dto
        listener:
          ack-mode: manual_immediate
          concurrency: 3
      jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: Asia/Shanghai
    mybatis:
      mapper-locations: classpath:mapper/*.xml
      type-aliases-package: com.example.demo.model.entity
      configuration:
        map-underscore-to-camel-case: true
    logging:
      level:
        root: INFO
        com.example.demo: INFO
    seckill:
      order-expire-minutes: 15
      stock-warmup-before-minutes: 5
      rate-limit:
        max-requests: 5
        window-seconds: 1
