<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>商品秒杀系统</h1>
        <p class="subtitle">分布式高并发秒杀演示平台</p>
    </header>

    <main>
        <!-- 服务器信息 -->
        <section class="server-info">
            <h2>负载均衡状态</h2>
            <div id="serverInfo" class="info-card">
                <p>点击按钮查看请求分发到哪个后端实例</p>
            </div>
            <button onclick="checkServer()">检测后端实例</button>
            <button onclick="batchCheck()">连续请求10次</button>
            <div id="batchResult" class="batch-result"></div>
        </section>

        <!-- 商品列表 -->
        <section class="product-section">
            <h2>商品列表</h2>
            <div id="productList" class="product-grid">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <!-- 秒杀区域 -->
        <section class="seckill-section">
            <h2>秒杀专区</h2>
            <div id="seckillList" class="product-grid">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <!-- 商品详情 -->
        <section class="detail-section" id="detailSection" style="display:none;">
            <h2>商品详情 (Redis缓存演示)</h2>
            <div class="detail-controls">
                <input type="number" id="productIdInput" placeholder="输入商品ID" value="1" min="1">
                <button onclick="queryProduct()">查询 (走缓存)</button>
                <button onclick="evictCache()">清除缓存</button>
                <button onclick="warmCache()">预热缓存</button>
            </div>
            <div id="detailResult" class="detail-card"></div>
        </section>
    </main>

    <footer>
        <p>分布式软件开发 - 容器化部署与负载均衡演示</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
