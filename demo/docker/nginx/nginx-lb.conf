user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式 - 包含upstream信息便于观察负载均衡效果
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'upstream=$upstream_addr '
                    'rt=$request_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript
               application/json application/javascript
               image/svg+xml;

    # =============================================
    # 负载均衡算法配置
    # 取消注释对应算法块，注释掉其他块即可切换
    # =============================================

    # --- 算法1: 轮询 (Round Robin, 默认) ---
    # 请求按顺序依次分配到不同的后端服务器
    upstream seckill_backend {
        server app1:8081;
        server app2:8082;
        keepalive 32;
    }

    # --- 算法2: 加权轮询 (Weighted Round Robin) ---
    # weight值越高，分配的请求越多
    # upstream seckill_backend {
    #     server app1:8081 weight=3;
    #     server app2:8082 weight=1;
    #     keepalive 32;
    # }

    # --- 算法3: 最少连接 (Least Connections) ---
    # 将请求分配给当前连接数最少的后端
    # upstream seckill_backend {
    #     least_conn;
    #     server app1:8081;
    #     server app2:8082;
    #     keepalive 32;
    # }

    # --- 算法4: IP Hash ---
    # 根据客户端IP的hash值分配，保证同一IP总是访问同一后端
    # upstream seckill_backend {
    #     ip_hash;
    #     server app1:8081;
    #     server app2:8082;
    #     keepalive 32;
    # }

    include /etc/nginx/conf.d/*.conf;
}
