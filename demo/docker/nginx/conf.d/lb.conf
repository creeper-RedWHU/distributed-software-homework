server {
    listen 80;
    server_name localhost;
    charset utf-8;

    access_log /var/log/nginx/lb_access.log main;
    error_log /var/log/nginx/lb_error.log warn;

    # =============================================
    # 动静分离 - 静态资源由Nginx直接提供
    # =============================================

    # 静态HTML页面
    location / {
        root /usr/share/nginx/html/static;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源 (CSS/JS/图片等)
    location ~* \.(html|css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/static;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Static-Cache "HIT";
        access_log off;
    }

    # =============================================
    # 动态请求 - 反向代理到后端集群
    # =============================================

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://seckill_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 添加响应头标识来源后端
        add_header X-Upstream-Addr $upstream_addr;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Ping 接口
    location /ping/ {
        proxy_pass http://seckill_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Upstream-Addr $upstream_addr;
    }

    # 健康检查
    location /health {
        access_log off;
        proxy_pass http://seckill_backend/ping/;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
