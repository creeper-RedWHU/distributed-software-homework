server {
    listen 80;
    server_name localhost;

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/seckill_access.log main;
    error_log /var/log/nginx/seckill_error.log warn;

    # 限流
    limit_req zone=seckill_limit burst=20 nodelay;
    limit_conn addr_limit 10;

    # 客户端上传大小限制
    client_max_body_size 10M;

    # 静态资源缓存（如果有前端资源）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket 支持
    location /ws/ {
        proxy_pass http://seckill_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 接口代理
    location /api/ {
        # 秒杀接口额外限流
        if ($request_uri ~* "/api/seckill/") {
            limit_req zone=seckill_limit burst=5 nodelay;
        }

        proxy_pass http://seckill_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 健康检查
    location /health {
        access_log off;
        proxy_pass http://seckill_backend/actuator/health;
    }

    # 默认路由
    location / {
        proxy_pass http://seckill_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
