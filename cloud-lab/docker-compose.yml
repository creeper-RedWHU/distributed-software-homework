version: "3.9"

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: cloud-lab-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/v1/console/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 20

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: cloud-lab-sentinel
    environment:
      JAVA_OPTS: "-Dserver.port=8858"
    ports:
      - "8858:8858"
